<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apertool AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #4d8a84 0%, #66a9a2 50%, #8fc4bd 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .login-container {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        width: 100%;
        max-width: 420px;
        padding: 40px;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo-img {
        width: 80px;
        height: 80px;
        margin: 0 auto 16px;
        object-fit: contain;
      }

      .logo h1 {
        font-size: 1.8rem;
        color: #1a1a2e;
        font-weight: 600;
      }

      .logo p {
        color: #6c757d;
        font-size: 0.95rem;
        margin-top: 8px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 0.9rem;
        font-weight: 500;
        color: #495057;
        margin-bottom: 8px;
      }

      .form-group input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 10px;
        border: 2px solid #e9ecef;
        font-size: 1rem;
        font-family: inherit;
        outline: none;
        transition: all 0.2s;
      }

      .form-group input:focus {
        border-color: #66a9a2;
        box-shadow: 0 0 0 4px rgba(102, 169, 162, 0.15);
      }

      .form-group input::placeholder {
        color: #adb5bd;
      }

      .error-message {
        background: #fff5f5;
        border: 1px solid #feb2b2;
        color: #c53030;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.9rem;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .error-message::before {
        content: "!";
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        background: #c53030;
        color: white;
        border-radius: 50%;
        font-size: 0.75rem;
        font-weight: 600;
      }

      .success-message {
        background: #f0fff4;
        border: 1px solid #9ae6b4;
        color: #276749;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.9rem;
        margin-bottom: 20px;
      }

      .btn {
        width: 100%;
        padding: 14px 24px;
        background: linear-gradient(135deg, #4d8a84 0%, #66a9a2 100%);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        font-family: inherit;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(102, 169, 162, 0.4);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }

      .btn-passkey {
        width: 100%;
        padding: 14px 24px;
        background: #fff;
        color: #1a1a2e;
        border: 2px solid #e9ecef;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .btn-passkey:hover {
        border-color: #66a9a2;
        background: #f5fafa;
      }

      .btn-passkey:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-passkey svg {
        width: 20px;
        height: 20px;
      }

      .passkey-hidden {
        display: none !important;
      }

      .divider {
        text-align: center;
        margin: 24px 0;
        color: #adb5bd;
        font-size: 0.85rem;
        position: relative;
      }

      .divider::before,
      .divider::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #e9ecef;
      }

      .divider::before {
        left: 0;
      }

      .divider::after {
        right: 0;
      }

      .footer-links {
        text-align: center;
        margin-top: 24px;
      }

      .footer-links a {
        color: #4d8a84;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

      /* Loading spinner */
      .btn.loading {
        position: relative;
        color: transparent;
      }

      .btn.loading::after {
        content: "";
        position: absolute;
        width: 20px;
        height: 20px;
        top: 50%;
        left: 50%;
        margin-left: -10px;
        margin-top: -10px;
        border: 2px solid #ffffff;
        border-radius: 50%;
        border-top-color: transparent;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 480px) {
        .login-container {
          padding: 30px 24px;
        }

        .logo h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="logo">
        <img src="/static/img/logo.png" alt="Logo" class="logo-img">
        <h1>Apertool AI</h1>
        <p>Sign in to your account</p>
      </div>

      {% if error %}
      <div class="error-message">
        {{ error }}
      </div>
      {% endif %}

      {% if message %}
      <div class="success-message">
        {{ message }}
      </div>
      {% endif %}

      <form id="loginForm" method="POST" action="/login">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            value="{{ email or '' }}"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn" id="submitBtn">
          Sign In
        </button>
      </form>

      <div class="divider" id="passkeyDivider">or</div>

      <button type="button" class="btn-passkey" id="passkeyBtn">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
          <path d="M12 10v12"/>
          <path d="M12 16h3"/>
          <path d="M12 19h2"/>
        </svg>
        Sign in with Passkey
      </button>

      <div class="footer-links">
        <a href="/">Back to Home</a>
      </div>
    </div>

    <script>
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const passkeyBtn = document.getElementById('passkeyBtn');
      const passkeyDivider = document.getElementById('passkeyDivider');

      // Check if WebAuthn is supported
      const passkeySupported = window.PublicKeyCredential !== undefined;

      if (!passkeySupported) {
        passkeyBtn.classList.add('passkey-hidden');
        passkeyDivider.classList.add('passkey-hidden');
      }

      form.addEventListener('submit', function() {
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
      });

      // Helper functions for base64url encoding/decoding
      function base64urlToArrayBuffer(base64url) {
        const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
        const padding = '='.repeat((4 - base64.length % 4) % 4);
        const binary = atob(base64 + padding);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes.buffer;
      }

      function arrayBufferToBase64url(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
      }

      async function loginWithPasskey() {
        passkeyBtn.disabled = true;
        passkeyBtn.innerHTML = '<span>Authenticating...</span>';

        try {
          // 1. Get challenge from server
          const optionsRes = await fetch('/api/auth/passkey/login/options', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({})
          });

          if (!optionsRes.ok) {
            throw new Error('Failed to get passkey options');
          }

          const { options, challenge_id } = await optionsRes.json();
          const parsedOptions = JSON.parse(options);

          // 2. Prepare public key options
          const publicKeyOptions = {
            challenge: base64urlToArrayBuffer(parsedOptions.challenge),
            rpId: parsedOptions.rpId,
            timeout: parsedOptions.timeout || 60000,
            userVerification: parsedOptions.userVerification || 'preferred',
          };

          // Add allowCredentials if present
          if (parsedOptions.allowCredentials && parsedOptions.allowCredentials.length > 0) {
            publicKeyOptions.allowCredentials = parsedOptions.allowCredentials.map(c => ({
              id: base64urlToArrayBuffer(c.id),
              type: 'public-key',
              transports: c.transports || ['internal', 'hybrid', 'usb', 'nfc', 'ble'],
            }));
          }

          // 3. Call WebAuthn API
          const credential = await navigator.credentials.get({
            publicKey: publicKeyOptions,
            mediation: 'optional',
          });

          if (!credential) {
            throw new Error('No credential returned');
          }

          // 4. Prepare credential response
          const credentialResponse = {
            id: credential.id,
            rawId: arrayBufferToBase64url(credential.rawId),
            response: {
              authenticatorData: arrayBufferToBase64url(credential.response.authenticatorData),
              clientDataJSON: arrayBufferToBase64url(credential.response.clientDataJSON),
              signature: arrayBufferToBase64url(credential.response.signature),
            },
            type: credential.type,
            authenticatorAttachment: credential.authenticatorAttachment,
          };

          // Add userHandle if present
          if (credential.response.userHandle) {
            credentialResponse.response.userHandle = arrayBufferToBase64url(credential.response.userHandle);
          }

          // 5. Send to server for verification
          const verifyRes = await fetch('/api/auth/passkey/login/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              challenge_id: challenge_id,
              credential: credentialResponse,
            })
          });

          const result = await verifyRes.json();

          if (!verifyRes.ok) {
            throw new Error(result.error || 'Authentication failed');
          }

          // 6. Store tokens and redirect
          localStorage.setItem('access_token', result.access_token);
          localStorage.setItem('refresh_token', result.refresh_token);
          localStorage.setItem('user', JSON.stringify(result.user));

          // Redirect to admin dashboard
          window.location.href = '/admin/';

        } catch (error) {
          console.error('Passkey login error:', error);

          // Show error message
          let errorDiv = document.querySelector('.error-message');
          if (!errorDiv) {
            errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            form.parentNode.insertBefore(errorDiv, form);
          }

          if (error.name === 'NotAllowedError') {
            errorDiv.textContent = 'Passkey authentication was cancelled or not allowed';
          } else if (error.name === 'SecurityError') {
            errorDiv.textContent = 'Security error: Please ensure you are using HTTPS';
          } else {
            errorDiv.textContent = error.message || 'Passkey authentication failed';
          }

          passkeyBtn.disabled = false;
          passkeyBtn.innerHTML = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
              <path d="M12 10v12"/>
              <path d="M12 16h3"/>
              <path d="M12 19h2"/>
            </svg>
            Sign in with Passkey
          `;
        }
      }

      passkeyBtn.addEventListener('click', loginWithPasskey);
    </script>
  </body>
</html>
